version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - prealloc
    - unconvert
    - revive
  disable:
    - godox
    - wsl

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/resume/k8s-resilience
  revive:
    rules:
      - name: exported
        severity: warning
      - name: context-as-argument
        severity: warning
      - name: error-return
        severity: warning
      - name: error-naming
        severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosimple
