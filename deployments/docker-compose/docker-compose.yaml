services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: appsecret
      POSTGRES_DB: tasks
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d tasks"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend-worker:
    build:
      context: ../../backend-worker
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
      DATABASE_URL: "postgres://app:appsecret@postgres:5432/tasks?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_SERVICE_NAME: "backend-worker"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-api:
    build:
      context: ../../frontend-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: "8080"
      GRPC_BACKEND_ADDR: "backend-worker:50051"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_SERVICE_NAME: "frontend-api"
    depends_on:
      backend-worker:
        condition: service_started

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ../../observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml

volumes:
  pgdata:
