apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-api
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: frontend
    {{- include "microservices.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/component: backend
    {{- include "microservices.labels" . | nindent 4 }}
