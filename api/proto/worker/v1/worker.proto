syntax = "proto3";

package worker.v1;

option go_package = "github.com/resume/k8s-resilience/api/proto/worker/v1;workerv1";

service TaskService {
  rpc GetTaskData(TaskRequest) returns (TaskResponse);
  rpc CreateTask(CreateTaskRequest) returns (TaskResponse);
}

message TaskRequest {
  string id = 1;
}

message CreateTaskRequest {
  string title = 1;
  string description = 2;
}

message TaskResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string served_by_pod = 5;
  string data_source = 6;
}
